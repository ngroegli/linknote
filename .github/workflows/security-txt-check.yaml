name: Security.txt Expiration Check

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger
  push:
    paths:
      - '.well-known/security.txt'

jobs:
  check-expiration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check security.txt expiration date
        run: |
          # Extract expiration date from security.txt
          EXPIRES_LINE=$(grep "^Expires:" .well-known/security.txt)
          EXPIRES_DATE=$(echo "$EXPIRES_LINE" | sed 's/Expires: //')

          # Convert expiration date to seconds since epoch
          EXPIRES_EPOCH=$(date -d "$EXPIRES_DATE" +%s)

          # Get current date in seconds since epoch
          CURRENT_EPOCH=$(date +%s)

          # Calculate 3 months from now (90 days)
          THREE_MONTHS_EPOCH=$((CURRENT_EPOCH + 90 * 24 * 60 * 60))

          # Calculate days until expiration
          DAYS_UNTIL_EXPIRATION=$(( (EXPIRES_EPOCH - CURRENT_EPOCH) / 86400 ))

          echo "Current date: $(date -u +%Y-%m-%d)"
          echo "Expiration date: $EXPIRES_DATE"
          echo "Days until expiration: $DAYS_UNTIL_EXPIRATION"

          # Check if expiration is within 3 months
          if [ $EXPIRES_EPOCH -lt $THREE_MONTHS_EPOCH ]; then
            echo "❌ ERROR: security.txt expires in $DAYS_UNTIL_EXPIRATION days (less than 90 days)!"
            echo "Please update the Expires field in .well-known/security.txt"
            exit 1
          else
            echo "✅ SUCCESS: security.txt expires in $DAYS_UNTIL_EXPIRATION days (more than 90 days)"
            exit 0
          fi

      - name: Create Issue if expiration is soon
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security.txt-expiration'
            });

            if (issues.data.length === 0) {
              const body = [
                'The `.well-known/security.txt` file will expire in less than 3 months.',
                '',
                'Please update the `Expires` field in `.well-known/security.txt` to extend the expiration date.',
                '',
                '**Action required:**',
                '1. Open `.well-known/security.txt`',
                '2. Update the `Expires` field to at least 1 year from now',
                '3. Commit and push the changes',
                '',
                '**Current expiration date:** Check the workflow logs for details.',
                '',
                'This issue was automatically created by the Security.txt Expiration Check workflow.'
              ].join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '⚠️ security.txt expiration date approaching',
                body: body,
                labels: ['security.txt-expiration', 'maintenance']
              });
            }
