name: Deploy to Production

on:
  # Automatically trigger after the Release workflow completes successfully on main
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
    branches:
      - main
  # Allow manual deployment of a specific tag
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g., v1.0.6)'
        required: true
        type: string

jobs:
  deploy-production:
    # For workflow_run: only deploy if the Release workflow succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://linknote.groeg.li

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to production via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PROD_FTP_SERVER }}
          username: ${{ secrets.PROD_FTP_USERNAME }}
          password: ${{ secrets.PROD_FTP_PASSWORD }}
          port: ${{ vars.PROD_FTP_PORT || 21 }}
          protocol: ${{ vars.PROD_FTP_PROTOCOL || 'ftp' }}
          local-dir: ./dist/
          server-dir: ${{ vars.PROD_FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          state-name: .ftp-deploy-sync-state-prod.json
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://linknote.groeg.li)
          if [ "$STATUS" == "200" ]; then
            echo "✅ Deployment verified — https://linknote.groeg.li returned HTTP $STATUS"
          else
            echo "⚠️ Site returned HTTP $STATUS — please check manually"
          fi

      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Successfully deployed v${{ steps.version.outputs.value }} to https://linknote.groeg.li"
          else
            echo "❌ Deployment of v${{ steps.version.outputs.value }} failed — check logs above"
          fi
