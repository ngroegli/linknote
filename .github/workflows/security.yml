name: Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm-audit
        run: |
          echo "🔍 Running npm audit..."

          # Run audit and capture output
          if npm audit --audit-level=moderate > audit-report.txt 2>&1; then
            echo "✓ No vulnerabilities found"
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Vulnerabilities detected"
            cat audit-report.txt
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Check for high/critical vulnerabilities
        run: |
          echo "🔍 Checking for high/critical severity vulnerabilities..."

          if npm audit --audit-level=high --json > audit-high.json 2>&1; then
            echo "✓ No high or critical vulnerabilities"
          else
            echo "❌ High or critical vulnerabilities found!"
            npm audit --audit-level=high
            exit 1
          fi

      - name: Generate audit report
        if: always()
        run: |
          echo "# Security Audit Report" > security-report.md
          echo "" >> security-report.md
          echo "**Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> security-report.md
          echo "**Branch:** ${{ github.ref_name }}" >> security-report.md
          echo "" >> security-report.md

          echo "## Dependency Audit" >> security-report.md
          npm audit --json | jq -r '.vulnerabilities | to_entries[] | "- **\(.key)**: \(.value.severity) - \(.value.via[0].title // "N/A")"' >> security-report.md || echo "No vulnerabilities" >> security-report.md

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
          retention-days: 30

      - name: Create issue if vulnerabilities found
        if: steps.npm-audit.outputs.has_vulnerabilities == 'true' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security: Vulnerabilities detected in dependencies',
              body: `## Security Alert\n\nVulnerabilities were detected during the scheduled security scan.\n\n${report}\n\n### Action Required\n\nPlease review and update dependencies:\n\`\`\`bash\nnpm audit fix\n# or for breaking changes:\nnpm audit fix --force\n\`\`\`\n\n**Automated scan from:** ${context.workflow} workflow`,
              labels: ['security', 'dependencies']
            });

  code-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for exposed secrets
        run: |
          echo "🔍 Checking for potential secrets in code..."

          # Check for common secret patterns
          if grep -rn "src/" -iE "(api[_-]?key|secret|password|token|auth[_-]?token)" --include="*.js" --include="*.html" | grep -v "password:" | grep -v "// "; then
            echo "⚠️ Potential secrets found in code (please review)"
          else
            echo "✓ No obvious secrets found"
          fi
        continue-on-error: true

      - name: Check for hardcoded URLs
        run: |
          echo "🔍 Checking for hardcoded sensitive URLs..."

          if grep -rn "src/" -E "https?://[^/]*\.(dev|local|internal)" --include="*.js" | grep -v "localhost"; then
            echo "⚠️ Found potentially sensitive URLs"
          else
            echo "✓ No sensitive URLs found"
          fi
        continue-on-error: true

      - name: Check dependencies licenses
        run: |
          echo "🔍 Checking dependency licenses..."
          npm install -g license-checker
          license-checker --json --out licenses.json

          # Check for copyleft licenses that might conflict with GPL-3.0
          if license-checker --summary | grep -iE "(GPL-2|AGPL|LGPL)"; then
            echo "⚠️ Found GPL-incompatible licenses - review required"
          else
            echo "✓ License compatibility check passed"
          fi
        continue-on-error: true

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json
          retention-days: 30

  security-scanning:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint Security Scanner
        run: |
          echo "🔍 Running ESLint security checks..."
          npm install --save-dev eslint eslint-plugin-security eslint-plugin-no-unsanitized

          # Create ESLint config for security
          cat > .eslintrc.security.json << 'EOF'
          {
            "plugins": ["security", "no-unsanitized"],
            "extends": ["plugin:security/recommended"],
            "rules": {
              "no-eval": "error",
              "no-implied-eval": "error",
              "no-new-func": "error",
              "no-script-url": "error",
              "no-unsanitized/method": "error",
              "no-unsanitized/property": "error"
            },
            "env": {
              "browser": true,
              "es2021": true
            }
          }
          EOF

          npx eslint src/**/*.js -c .eslintrc.security.json --max-warnings=0 || echo "⚠️ Security issues found"
        continue-on-error: true

      - name: Check for vulnerable patterns
        run: |
          echo "🔍 Scanning for vulnerable code patterns..."

          # Check for eval usage
          if grep -rn "eval(" src/ --include="*.js"; then
            echo "❌ Found eval() usage - security risk"
            exit 1
          fi

          # Check for innerHTML without sanitization
          if grep -rn "\.innerHTML\s*=" src/ --include="*.js" | grep -v "DOMPurify"; then
            echo "❌ Found innerHTML usage without DOMPurify - XSS risk"
            exit 1
          fi

          # Check for document.write
          if grep -rn "document\.write" src/ --include="*.js"; then
            echo "❌ Found document.write() - security risk"
            exit 1
          fi

          echo "✓ No obvious vulnerable patterns found"
        continue-on-error: true
