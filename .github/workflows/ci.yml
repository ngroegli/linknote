name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 25.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Check JavaScript syntax (ESLint)
        run: |
          # Install ESLint and plugins
          npm install --save-dev eslint

          # Run ESLint on source files
          npx eslint src/**/*.js --max-warnings=0 || echo "⚠️ ESLint not configured yet, skipping..."
        continue-on-error: true

      - name: Check HTML validity
        run: |
          # Check for basic HTML syntax issues
          if grep -rn "src/.*\.html" -e "</[^>]*[^/]>.*<[^/]" 2>/dev/null; then
            echo "✓ HTML files found"
          fi

      - name: Check CSS syntax
        run: |
          # Install stylelint if needed
          npm install --save-dev stylelint stylelint-config-standard || true

          # Check CSS
          npx stylelint "src/**/*.css" || echo "⚠️ Stylelint not configured, skipping..."
        continue-on-error: true

      - name: Validate package.json
        run: npm pkg fix --dry-run

      - name: Check for console.log statements
        run: |
          if grep -rn "src/" -e "console\.log" --include="*.js" | grep -v "\/\/" | grep -v "console.log(\"LinkNote"; then
            echo "⚠️ Found console.log statements (review if they should be removed)"
          else
            echo "✓ No unwanted console.log statements found"
          fi
        continue-on-error: true

      - name: Build project
        run: npm run build

      - name: Check build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed - dist directory not created"
            exit 1
          fi

          if [ ! -f "dist/index.html" ]; then
            echo "❌ Build failed - index.html not found in dist"
            exit 1
          fi

          echo "✓ Build successful"

      - name: Check bundle size
        run: |
          JS_SIZE=$(find dist/assets -name "*.js" -exec du -sb {} + | awk '{sum+=$1} END {print sum}')
          CSS_SIZE=$(find dist/assets -name "*.css" -exec du -sb {} + | awk '{sum+=$1} END {print sum}')

          echo "📦 Bundle sizes:"
          echo "  JavaScript: $(($JS_SIZE / 1024)) KB"
          echo "  CSS: $(($CSS_SIZE / 1024)) KB"

          # Warning if JS bundle is too large (>200KB uncompressed)
          if [ $JS_SIZE -gt 204800 ]; then
            echo "⚠️ JavaScript bundle is large (>200KB)"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.node-version }}
          path: dist/
          retention-days: 7

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for TODOs and FIXMEs
        run: |
          echo "🔍 Checking for TODO and FIXME comments..."
          grep -rn "src/" -e "TODO\|FIXME" --include="*.js" --include="*.html" --include="*.css" || echo "✓ No TODOs or FIXMEs found"
        continue-on-error: true

      - name: Check file sizes
        run: |
          echo "📄 Large files check:"
          find src/ -type f -size +100k -exec ls -lh {} \; || echo "✓ No large files found"

      - name: Validate JSON files
        run: |
          echo "🔍 Validating JSON files..."
          for file in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./dist/*"); do
            if ! jq empty "$file" 2>/dev/null; then
              echo "❌ Invalid JSON: $file"
              exit 1
            fi
          done
          echo "✓ All JSON files valid"
